# =============================================================================
# SALOON SERVICE CONFIGURATION
# =============================================================================

# Application Information
spring.application.name=saloon-service
spring.application.description=Saloon Management Service

# =============================================================================
# SERVICE DISCOVERY
# =============================================================================
# No Eureka: clients reach this service via Kubernetes Service DNS (CoreDNS).

# Server Configuration
server.port=0
server.servlet.context-path=${SERVER_CONTEXT_PATH:/}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never



# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================

# DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DATABASE_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DATABASE_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DATABASE_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DATABASE_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DATABASE_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${DATABASE_LEAK_DETECTION:60000}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=${JPA_BATCH_SIZE:30}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================

# Redis Cache Configuration
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.host=localhost
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000ms}
spring.redis.lettuce.pool.max-active=${REDIS_MAX_ACTIVE:10}
spring.redis.lettuce.pool.max-idle=${REDIS_MAX_IDLE:10}
spring.redis.lettuce.pool.min-idle=${REDIS_MIN_IDLE:2}

# Cache TTL Configuration
spring.cache.redis.time-to-live=${CACHE_TTL:600000}

# Force cache eviction on startup
spring.cache.cache-names=saloonsCache
spring.cache.redis.cache-null-values=false

# =============================================================================
# KAFKA CONFIGURATION
# =============================================================================

# Kafka Producer Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=${KAFKA_PRODUCER_ACKS:all}
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:3}
spring.kafka.producer.batch-size=${KAFKA_PRODUCER_BATCH_SIZE:16384}
spring.kafka.producer.buffer-memory=${KAFKA_PRODUCER_BUFFER_MEMORY:33554432}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Logging Levels
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.baber.saloonservice=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.springframework.data.redis=${LOG_LEVEL_REDIS:INFO}
logging.level.org.springframework.cache=${LOG_LEVEL_CACHE:INFO}

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId:-} spanId=%X{spanId:-}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId:-} spanId=%X{spanId:-}] - %msg%n

# =============================================================================
# ACTUATOR CONFIGURATION
# =============================================================================

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops,loggers
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:always}
management.endpoint.health.show-components=always
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Metrics Configuration
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# =============================================================================
# OPENAPI/SWAGGER CONFIGURATION
# =============================================================================

# OpenAPI Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

# CORS Configuration - Disabled because CORS is handled by API Gateway
# If accessing this service directly (not through gateway), uncomment and configure:
# spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# spring.web.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
# spring.web.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
# spring.web.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# =============================================================================
# FEATURE FLAGS
# =============================================================================

# Feature Toggles
app.features.audit-logging=${AUDIT_LOGGING_ENABLED:true}
app.features.rate-limiting=${RATE_LIMITING_ENABLED:true}
app.features.circuit-breaker=${CIRCUIT_BREAKER_ENABLED:false}
app.features.cache-enabled=${CACHE_ENABLED:true}
