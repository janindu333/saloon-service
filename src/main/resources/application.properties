
eureka.url = http://eureka:password@localhost:8761/eureka

eureka.client.serviceUrl.defaultZone=${eureka.url}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug

spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache=DEBUG

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/test-service/v3/api-docs

#spring.r2dbc.url=r2dbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true
#spring.r2dbc.username=root
#spring.r2dbc.password=root
#spring.r2dbc.driver=MySQL

server.port=0

spring.application.name=saloon-service
