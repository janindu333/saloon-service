eureka.url=http://eureka:password@discovery-server:8761/eureka
eureka.client.serviceUrl.defaultZone=${eureka.url}
spring.application.name=saloon-service

server.port=8083

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/saloon-service?createDatabaseIfNotExist=true 
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug

spring.cache.type=redis
spring.data.redis.host=redis-service.default.svc.cluster.local
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis.cache=DEBUG


eureka.instance.prefer-ip-address=false
eureka.instance.hostname=saloon-service.default.svc.cluster.local
